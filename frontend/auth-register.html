<!doctype html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Register - BillMate</title>
  <link rel="icon" type="image/x-icon"
    href="static/assets/img/logo/billmate-sm.png">

  <!-- CSS files -->
  <link href="static/assets/css/tabler.min.css" rel="stylesheet" />
  <link href="static/assets/css/tabler-flags.min.css" rel="stylesheet" />
  <link href="static/assets/css/tabler-payments.min.css" rel="stylesheet" />
  <link href="static/assets/css/tabler-vendors.min.css" rel="stylesheet" />
  <link href="static/assets/css/demo.min.css" rel="stylesheet" />
  <link href="static/assets/libs/tabler-icons/webfont/tabler-icons.min.css"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.1/css/toastr.css" rel="stylesheet" />

</head>

<body class="border-top-wide border-primary d-flex flex-column">

  <div class="page page-center">
    <div class="container-tight py-4 px-2">
      <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand navbar-brand-autodark"><img src="static/assets/img/logo/billmate.png"
            alt="Billmate"></a>
      </div>
      <form class="card card-md" id="registerForm" autocomplete="off">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Create new account</h2>
          <div class="mb-3">
            <label class="form-label required">Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Enter name" required>
          </div>
          <div class="mb-3">
            <label class="form-label required">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
          </div>
          <div class="mb-3">
            <label class="form-label required">Password</label>
            <div class="input-group input-group-flat">
              <input type="password" class="form-control" name="password" id="password" placeholder="Password" autocomplete="off"
                required>
              <span class="input-group-text">
                <a href="javascript:;" class="icon" title="Show password" id="togglePassword">
                  <i class="ti ti-eye fs__24"></i>            
                </a>
              </span>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label required">Retype Password</label>
            <div class="input-group input-group-flat">
              <input type="password" class="form-control" name="cpassword" id="cpassword" placeholder="Retype Password" autocomplete="off"
                required>
              <span class="input-group-text">
                <a href="javascript:;" class="icon" title="Show password" id="toggleCPassword">
                  <i class="ti ti-eye fs__24"></i>            
                </a>
              </span>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-check">
              <input type="checkbox" class="form-check-input" id="terms_condition" required/>
              <span class="form-check-label">Agree the <a href="javascript:;" tabindex="-1">terms and policy</a>.</span>
            </label>
          </div>
          <div class="form-footer">
            <a href="javascript:;" id="register_submit" class="btn btn-primary w-100">Create new account</a>
          </div>
        </div>

      </form>
      <div class="text-center text-muted mt-3">
        Already have account? <a href="auth-login.html" tabindex="-1">Sign in</a>
      </div>
    </div>
  </div>
  <!-- Libs JS -->
  <!-- Tabler Core -->
  <script src="static/assets/libs/jquery/jquery.min.js"></script>
  <script src="static/assets/libs/crypto/crypto-js.min.js"></script>
  <script src="static/assets/js/tabler.min.js"></script>
  <script src="static/assets/js/demo.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.1/js/toastr.js"></script>
  <script src="static/assets/js/common/toaster.js"></script>
  <script src="static/assets/js/common/common.js"></script>
  <script src="static/assets/js/auth/auth.js"></script>
  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {
      // Function to toggle password visibility and icon
      function togglePasswordVisibility(passwordInputId, toggleIconId) {
        const passwordInput = document.getElementById(passwordInputId);
        const toggleIcon = document.getElementById(toggleIconId);
        const isPasswordVisible = passwordInput.type === 'password';

        passwordInput.type = isPasswordVisible ? 'text' : 'password'; // Toggle the type
        toggleIcon.innerHTML = isPasswordVisible ? '<i class="ti ti-eye-off fs__24"></i>' : '<i class="ti ti-eye fs__24"></i>';
      }

      // Event listener for the password field
      document.getElementById('togglePassword').addEventListener('click', function () {
        togglePasswordVisibility('password', 'togglePassword');
      });

      document.getElementById('toggleCPassword').addEventListener('click', function () {
        togglePasswordVisibility('cpassword', 'toggleCPassword');
      });

      $(document).ajaxStart(function() {
        $('#register_submit').addClass('btn-loading disabled').css('pointer-events', 'none');
      });

      $(document).ajaxStop(function() {
        $('#register_submit').removeClass('btn-loading disabled').css('pointer-events', '');
      });
    });
  </script>
</body>

</html>
